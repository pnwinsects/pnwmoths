name: Deploy to GitHub Pages
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: nschloe/action-cached-lfs-checkout@v1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache lychee binary
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/lychee
          key: lychee-0.23.0-linux-amd64
      - name: Install lychee if not cached
        run: |
          if [ ! -f ~/.local/bin/lychee ]; then
            mkdir -p ~/.local/bin
            wget -qO /tmp/lychee.tar.gz \
              https://github.com/lycheeverse/lychee/releases/download/lychee-v0.23.0/lychee-x86_64-unknown-linux-gnu.tar.gz
            tar -xzf /tmp/lychee.tar.gz -C ~/.local/bin
            chmod +x ~/.local/bin/lychee
          fi
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Cache lychee URL results
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: lychee-cache-
      - uses: actions/configure-pages@v5
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
